name: Build & Release BeatForge

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write   # needed to create GitHub Releases

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install

      - name: Build & publish Windows installer
        run: npm run build -- --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload installer artifact (backup)
        uses: actions/upload-artifact@v4
        with:
          name: BeatForge-Windows-Installer
          path: dist/*.exe
          retention-days: 30
